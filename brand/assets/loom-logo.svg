<svg xmlns="http://www.w3.org/2000/svg" viewBox="92 32 416 507" width="100%">
  <!--
    Clear space: 48 px on every side (cap-height of the L at 69 px / Montserrat Bold).
    Visual content occupies x 140–460, y 80–491 in the coordinate system below.
    The viewBox extends 48 px beyond each edge: x 92, y 32, width 416, height 507.
  -->
  <defs>
    <style>
      @font-face {
        font-family: 'Montserrat';
        src: url('../fonts/montserrat.ttf') format('truetype');
        font-weight: 100 900;
        font-style: normal;
      }
      .logo-bg {
        fill: #0A1B3D;
      }
      .logo-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 69px;
        fill: #0A1B3D;
      }
    </style>

    <linearGradient id="gradLeft" x1="0" y1="80" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#D600FF"/>
    </linearGradient>

    <linearGradient id="gradRight" x1="0" y1="80" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D600FF"/>
      <stop offset="50%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>

    <linearGradient id="gradInfinity" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#D600FF"/>
    </linearGradient>

    <clipPath id="circle-mask">
      <circle cx="300" cy="240" r="160" />
    </clipPath>
  </defs>

  <g clip-path="url(#circle-mask)" shape-rendering="crispEdges">
    <rect x="0" y="0" width="218" height="158" class="logo-bg" />
    <rect x="382" y="0" width="218" height="158" class="logo-bg" />
    <rect x="0" y="322" width="218" height="238" class="logo-bg" />
    <rect x="382" y="322" width="218" height="238" class="logo-bg" />

    <rect x="0" y="186" width="600" height="40" class="logo-bg" />
    <rect x="0" y="254" width="600" height="40" class="logo-bg" />

    <rect x="246" y="0" width="40" height="560" fill="url(#gradLeft)" />
    <rect x="314" y="0" width="40" height="560" fill="url(#gradRight)" />

    <rect x="314" y="186" width="40" height="40" class="logo-bg" />
    <rect x="246" y="254" width="40" height="40" class="logo-bg" />
  </g>

  <text x="230" y="480" class="logo-text" text-anchor="end">L</text>

  <path d="M 300 455
           C 312 425, 355 425, 355 455
           C 355 485, 312 485, 300 455
           C 288 425, 245 425, 245 455
           C 245 485, 288 485, 300 455 Z"
        fill="none"
        stroke="url(#gradInfinity)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <text x="370" y="480" class="logo-text" text-anchor="start">M</text>

</svg>
